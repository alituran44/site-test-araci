version: '3.8'

services:
  postgres:
    image: postgres:16-alpine
    container_name: webaudit-postgres
    restart: always
    environment:
      POSTGRES_DB: webaudit
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - webaudit-network

  redis:
    image: redis:7-alpine
    container_name: webaudit-redis
    restart: always
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    networks:
      - webaudit-network

  api:
    build:
      context: .
      dockerfile: docker/Dockerfile.api
    container_name: webaudit-api
    restart: always
    environment:
      PORT: 3001
      DATABASE_URL: "postgresql://postgres:postgres@postgres:5432/webaudit?schema=public"
      JWT_ACCESS_SECRET: "default_access_secret_key_change_in_production_12345!"
      REDIS_HOST: "redis"
      REDIS_PORT: 6379
      FRONTEND_URL: "http://localhost:3000"
    ports:
      - "3001:3001"
    depends_on:
      - postgres
      - redis
    networks:
      - webaudit-network

  web:
    build:
      context: .
      dockerfile: docker/Dockerfile.web
    container_name: webaudit-web
    restart: always
    environment:
      PORT: 3000
      NEXT_PUBLIC_API_URL: "http://localhost:3001"
    ports:
      - "3000:3000"
    depends_on:
      - api
    networks:
      - webaudit-network

volumes:
  postgres_data:
  redis_data:

networks:
  webaudit-network:
    driver: bridge
